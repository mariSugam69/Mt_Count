<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Muthi Count Finder</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI, sans-serif;

/* Advanced animated gradient background */
background:linear-gradient(270deg,#ff7e5f,#feb47b,#6a11cb,#2575fc);
background-size:800% 800%;
animation:bgMove 15s ease infinite;

overflow:hidden;
}

/* Background animation */
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Glass container */
.container{
width:420px;
padding:45px;
border-radius:25px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
color:white;
}

/* Title */
h1{
margin-bottom:30px;
font-size:30px;
}

/* Input */
input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:12px;
font-size:18px;
margin-bottom:25px;
background:rgba(255,255,255,0.9);
color:#333;
}

/* Button */
button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

button:hover{
transform:scale(1.07);
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

/* Result */
.result{
margin-top:30px;
font-size:48px;
font-weight:bold;
}

/* Emoji animation */
.emoji{
position:absolute;
font-size:32px;
animation:pop 2s ease-out forwards;
}

@keyframes pop{
0%{
transform:scale(0);
opacity:1;
}
50%{
transform:scale(1.6);
}
100%{
transform:translateY(-220px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Muthi Count Finder 💦</h1>

<input type="text" id="name" placeholder="Enter your name">

<button onclick="generate()">Result ✊</button>

<div class="result" id="result"></div>

</div>

<script>

function generate(){

let name=document.getElementById("name").value.trim();

if(name===""){
alert("Enter your name");
return;
}

let first=name.charAt(0).toUpperCase();
let ascii=first.charCodeAt(0);
let length=name.length;

let number=(ascii*length)%1000;
number=number.toString().padStart(3,"0");

document.getElementById("result").innerHTML=number;

/* change title */
document.getElementById("title").innerHTML="hila lo bhai mat ruko 😂";

/* create emojis */
for(let i=0;i<15;i++){

let emoji=document.createElement("div");
emoji.innerHTML="💦";
emoji.classList.add("emoji");

emoji.style.left=Math.random()*100+"vw";
emoji.style.top=Math.random()*100+"vh";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.remove();
},2000);

}

}

</script>

</body>
</html>
