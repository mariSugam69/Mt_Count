<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Muthi Count Finder</title>

<style>

/* ===== BODY ===== */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI, sans-serif;

 background:
    linear-gradient(rgba(0, 0, 0, 0.765), rgba(0, 0, 0, 0.783)),
    url('https://i.ebayimg.com/images/g/f3wAAOSw3Vxjwgc-/s-l960.jpg')
    no-repeat center center fixed;
  background-size: cover;
overflow:hidden;
margin:0;
}

/* ===== GLASS CONTAINER ===== */
.container{
width:420px;
padding:45px;
border-radius:25px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(5px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
color:white;
}

/* ===== TITLE ===== */
h1{
margin-bottom:30px;
font-size:30px;
}

/* ===== SAME SIZE INPUT + BUTTON ===== */
input,
button{
width:100%;
height:58px;
padding:0 18px;
border:none;
outline:none;
border-radius:16px;
font-size:18px;
margin-bottom:22px;
box-sizing:border-box;
font-family:inherit;
}

/* ===== INPUT STYLE ===== */
input{
background:rgba(255,255,255,0.95);
color:#333;
transition:all 0.25s ease;
}

input::placeholder{
color:#777;
}

/* 🔥 Input focus glow */
input:focus{
background:white;
box-shadow:
0 0 10px rgba(255,255,255,0.9),
0 0 25px rgba(255,255,255,0.6);
transform:scale(1.02);
border: 2px solid black;
}

/* ===== BUTTON STYLE ===== */
button{
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
font-weight:bold;
cursor:pointer;
transition:all 0.25s ease;
box-shadow:0 8px 22px rgba(0,0,0,0.45);
}

/* 🔥 GLOW HOVER */
button:hover{
transform:translateY(-2px) scale(1.04);
box-shadow:
0 0 7px #ded9da,
0 0 15px #ded9da,
0 0 35px #ded9da,
0 12px 30px rgba(0,0,0,0.6);
}

/* Click effect */
button:active{
transform:scale(0.98);
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* ===== RESULT ===== */
.result{
margin-top:30px;
font-size:48px;
font-weight:bold;
letter-spacing:3px;
}

/* ===== SUB TEXT ===== */
h3{
margin-top:15px;
font-weight:bold;
color: rgb(255, 255, 255);
}

/* ===== EMOJI ANIMATION ===== */
.emoji{
position:absolute;
font-size:32px;
animation:pop 2s ease-out forwards;
pointer-events:none;
}

@keyframes pop{
0%{
transform:scale(0);
opacity:1;
}
50%{
transform:scale(1.6);
}
100%{
transform:translateY(-220px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Muthi Count Finder 💦</h1>

<input type="text" id="name" placeholder="Enter your name">

<button onclick="generate()">Result ✊</button>

<div class="result" id="result"></div>

<h3 id="title1"></h3>

</div>

<script>

function generate(){

let name=document.getElementById("name").value.trim();

if(name===""){
alert("Enter your name");
return;
}

let first=name.charAt(0).toUpperCase();
let ascii=first.charCodeAt(0);
let length=name.length;

let number=(ascii*length)%1000;
number=number.toString().padStart(3,"0");

document.getElementById("result").innerHTML=number;

/* Funny message */
document.getElementById("title1").innerHTML="Mat ruko bhai, hila lo!💀";

/* 💦 Emoji animation */
for(let i=0;i<15;i++){

let emoji=document.createElement("div");
emoji.innerHTML="💦";
emoji.classList.add("emoji");

emoji.style.left=Math.random()*100+"vw";
emoji.style.top=Math.random()*100+"vh";

document.body.appendChild(emoji);

setTimeout(()=>{
emoji.remove();
},2000);

}

}

/* ENTER KEY SUPPORT ⌨️ */
document.getElementById("name")
.addEventListener("keypress", function(e){
if(e.key === "Enter"){
generate();
}
});

</script>

</body>
</html>
